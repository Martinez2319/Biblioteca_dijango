{% load static %}
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include '_seo_head.html' %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        .callback-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .callback-box {
            max-width: 420px;
            padding: 2.5rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
        }
        .spinner {
            width: 48px; height: 48px; margin: 0 auto 1.5rem;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .err-title { color: var(--danger); }
        .err-box { display: none; }
        .err-box.visible { display: block; }
        .ok-box.hidden { display: none; }
        .btn-retry { margin-top: 1rem; }
    </style>
</head>
<body>
<div class="callback-wrap">
    <div class="callback-box">
        <div class="ok-box" id="okBox">
            <div class="spinner"></div>
            <h2>Verificando tu cuenta de Google...</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">
                Confirmamos que tu correo pertenezca a una cuenta existente.
            </p>
        </div>
        <div class="err-box" id="errBox">
            <h2 class="err-title">No pudimos verificar tu cuenta</h2>
            <p id="errMsg" style="color: var(--text-muted); margin-top: 0.5rem;"></p>
            <a href="/login" class="btn btn-primary btn-retry" data-testid="gauth-back">Volver al login</a>
        </div>
    </div>
</div>
<script>
// REMINDER: DO NOT HARDCODE THE URL, OR ADD ANY FALLBACKS OR REDIRECT URLS,
// THIS BREAKS THE AUTH. El session_id viene en el fragmento de la URL puesto por Emergent.
(async function () {
    const okBox = document.getElementById('okBox');
    const errBox = document.getElementById('errBox');
    const errMsg = document.getElementById('errMsg');

    function showError(msg) {
        okBox.classList.add('hidden');
        errBox.classList.add('visible');
        errMsg.textContent = msg;
    }

    // 1) Extraer session_id del fragmento: #session_id=XXXX
    const hash = window.location.hash || '';
    const match = hash.match(/session_id=([^&]+)/);
    if (!match) {
        showError('No se recibio el identificador de sesion. Intenta de nuevo.');
        return;
    }
    const sessionId = decodeURIComponent(match[1]);

    // 2) Limpiar el hash para que no quede el session_id visible
    try {
        history.replaceState(null, '', window.location.pathname);
    } catch (_) { /* ignore */ }

    // 3) Enviar al backend para validar + crear/recuperar usuario + cookie JWT
    try {
        const res = await fetch('/api/auth/google', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ session_id: sessionId })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
            showError(data.error || 'No se pudo validar la cuenta de Google.');
            return;
        }
        // 4) Listo -> al home (o dashboard si es admin)
        const target = data.user && data.user.role === 'admin' ? '/dashboard' : '/';
        window.location.replace(target);
    } catch (e) {
        showError('Error de red verificando la cuenta.');
    }
})();
</script>
</body>
</html>
