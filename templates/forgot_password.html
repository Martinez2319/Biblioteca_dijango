{% load static %}
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include '_seo_head.html' %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
        }
        
        .auth-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            max-width: 480px;
            margin: 0 auto;
        }
        
        .auth-image {
            flex: 1;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            position: relative;
            display: none;
        }
        
        .auth-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200') center/cover;
            opacity: 0.2;
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            margin-bottom: 2rem;
        }
        
        .auth-logo svg {
            color: var(--accent-primary);
        }
        
        .auth-form h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        
        .auth-form > p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        
        .auth-form .btn {
            width: 100%;
            padding: 1rem;
            margin-top: 0.5rem;
        }
        
        .auth-link {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9375rem;
            color: var(--text-muted);
        }
        
        .auth-link a {
            color: var(--accent-primary);
            font-weight: 600;
        }
        
        .message {
            padding: 0.875rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }
        
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
        }
        
        @media (min-width: 768px) {
            .auth-image { display: block; }
            .auth-form { padding: 3rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-form">
            <a href="/" class="auth-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                Biblioteca Virtual
            </a>
            
            <h1>Recuperar contraseña</h1>
            <p>Ingresa tu email y te enviaremos un enlace para restablecer tu contraseña.</p>
            
            <div class="message" id="message"></div>
            
            <form id="forgotForm">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" required placeholder="tu@email.com" data-testid="forgot-email">
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn" data-testid="forgot-submit">
                    Enviar enlace de recuperación
                </button>
            </form>
            
            <p class="auth-link">
                <a href="/login">Volver a iniciar sesión</a>
            </p>
        </div>
        <div class="auth-image"></div>
    </div>
    
    <script>
        const saved = localStorage.getItem('theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
        
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msgEl = document.getElementById('message');
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msgEl.className = 'message success';
                    msgEl.textContent = data.message || 'Revisa tu correo para el enlace de recuperación.';
                    msgEl.style.display = 'block';
                    document.getElementById('forgotForm').style.display = 'none';
                } else {
                    msgEl.className = 'message error';
                    msgEl.textContent = data.error || 'Error al enviar el email';
                    msgEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Enviar enlace de recuperación';
                }
            } catch (e) {
                msgEl.className = 'message error';
                msgEl.textContent = 'Error de conexión';
                msgEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Enviar enlace de recuperación';
            }
        });
    </script>
</body>
</html>
