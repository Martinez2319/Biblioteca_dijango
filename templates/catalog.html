{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
.catalog-page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
}

.catalog-header {
    margin-bottom: 2rem;
}

.catalog-header h1 {
    margin-bottom: 1.5rem;
}

.filters {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
}

.filters input,
.filters select {
    padding: 0.75rem 1rem;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 0.9375rem;
    transition: all var(--transition);
}

.filters input {
    flex: 1;
    min-width: 200px;
}

.filters select {
    min-width: 160px;
}

.filters input:focus,
.filters select:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-light);
}

.view-toggle {
    display: flex;
    gap: 0.25rem;
    padding: 0.25rem;
    background: var(--bg-tertiary);
    border-radius: var(--radius-md);
}

.view-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.view-btn:hover {
    color: var(--text-primary);
}

.view-btn.active {
    background: var(--bg-secondary);
    color: var(--accent-primary);
    box-shadow: var(--shadow-sm);
}

/* Grid View */
.books-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 1.5rem;
}

/* List View */
.books-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.books-list .book-card {
    display: flex;
    flex-direction: row;
    border-radius: var(--radius-lg);
}

.books-list .book-card img {
    width: 100px;
    height: 140px;
    object-fit: cover;
    border-radius: var(--radius-md) 0 0 var(--radius-md);
}

.books-list .book-card-content {
    flex: 1;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.books-list .book-card h3 {
    font-size: 1rem;
    white-space: normal;
    margin-bottom: 0.5rem;
}

.books-list .book-card p {
    white-space: normal;
}

.books-list .book-card .book-desc {
    font-size: 0.8125rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.books-list .book-card .book-meta {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
}

/* Premium Badge */
.premium-badge {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    color: white;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
}

.book-card {
    position: relative;
}

/* Rating Stars */
.rating-stars {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 0.75rem;
    color: var(--text-muted);
}

.rating-stars .star {
    color: #f59e0b;
}

.empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
}

.empty-state svg {
    width: 64px;
    height: 64px;
    margin-bottom: 1rem;
    opacity: 0.5;
}

@media (max-width: 768px) {
    .catalog-page {
        padding: 1.5rem 1rem;
    }
    
    .filters {
        flex-direction: column;
    }
    
    .filters input,
    .filters select {
        width: 100%;
    }
    
    .books-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
    }
    
    .books-list .book-card img {
        width: 80px;
        height: 110px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="catalog-page">
    <div class="catalog-header">
        <h1>Catálogo de Libros</h1>
        <div class="filters">
            <input type="text" id="search" placeholder="Buscar por título o autor..." data-testid="search-input">
            <select id="category" data-testid="category-filter">
                <option value="">Todas las categorías</option>
            </select>
            <select id="sort" data-testid="sort-filter">
                <option value="createdAt">Más recientes</option>
                <option value="views">Más populares</option>
                <option value="title">Título A-Z</option>
                <option value="rating">Mejor calificados</option>
            </select>
            <select id="priceFilter" data-testid="price-filter">
                <option value="">Todos</option>
                <option value="free">Gratis</option>
                <option value="premium">Premium</option>
            </select>
            <div class="view-toggle">
                <button class="view-btn active" onclick="setView('grid')" id="gridViewBtn" data-testid="view-grid" title="Cuadrícula">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                    </svg>
                </button>
                <button class="view-btn" onclick="setView('list')" id="listViewBtn" data-testid="view-list" title="Lista">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
                        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <div class="books-grid" id="books" data-testid="books-grid"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Usa PLACEHOLDER_IMG, escapeHtml y convertDriveImageUrl de common.js
let currentView = localStorage.getItem('catalogView') || 'grid';
let booksData = [];

function renderStars(rating) {
    const fullStars = Math.floor(rating);
    const hasHalf = rating % 1 >= 0.5;
    let html = '';
    for (let i = 0; i < 5; i++) {
        if (i < fullStars) {
            html += '<span class="star">★</span>';
        } else if (i === fullStars && hasHalf) {
            html += '<span class="star">★</span>';
        } else {
            html += '<span>☆</span>';
        }
    }
    return html;
}

function renderBookCard(book, view) {
    const cover = convertDriveImageUrl(book.coverUrl) || PLACEHOLDER_IMG;
    const premiumBadge = book.isPremium ? `<span class="premium-badge">Premium $${book.price || 0}</span>` : '';
    const rating = book.averageRating || 0;
    const ratingHtml = rating > 0 ? `<div class="rating-stars">${renderStars(rating)} <span>(${rating})</span></div>` : '';
    
    if (view === 'list') {
        return `
            <div class="book-card" onclick="location.href='/book/${book._id}'" data-testid="book-card-${book._id}">
                ${premiumBadge}
                <img src="${cover}" alt="${escapeHtml(book.title)}" loading="lazy" onerror="this.src='${PLACEHOLDER_IMG}'">
                <div class="book-card-content">
                    <h3>${escapeHtml(book.title)}</h3>
                    <p>${escapeHtml(book.author)}</p>
                    <p class="book-desc">${escapeHtml(book.description || '')}</p>
                    <div class="book-meta">
                        ${ratingHtml}
                        <span class="badge" style="font-size: 0.6875rem;">${book.views || 0} vistas</span>
                    </div>
                </div>
            </div>
        `;
    }
    
    return `
        <div class="book-card" onclick="location.href='/book/${book._id}'" data-testid="book-card-${book._id}">
            ${premiumBadge}
            <img src="${cover}" alt="${escapeHtml(book.title)}" loading="lazy" onerror="this.src='${PLACEHOLDER_IMG}'">
            <div class="book-card-content">
                <h3>${escapeHtml(book.title)}</h3>
                <p>${escapeHtml(book.author)}</p>
                ${ratingHtml}
            </div>
        </div>
    `;
}

function setView(view) {
    currentView = view;
    localStorage.setItem('catalogView', view);
    
    document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
    document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
    
    const container = document.getElementById('books');
    container.className = view === 'grid' ? 'books-grid' : 'books-list';
    
    renderBooks();
}

function renderBooks() {
    const container = document.getElementById('books');
    
    if (booksData.length === 0) {
        container.innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                <h3>No se encontraron libros</h3>
                <p>Intenta con otros términos de búsqueda</p>
            </div>
        `;
    } else {
        container.innerHTML = booksData.map(b => renderBookCard(b, currentView)).join('');
    }
}

async function loadCategories() {
    try {
        const cats = await fetch('/api/categories').then(r => r.json());
        const select = document.getElementById('category');
        cats.forEach(c => {
            select.innerHTML += `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`;
        });
        
        const params = new URLSearchParams(location.search);
        if (params.get('category')) {
            select.value = params.get('category');
        }
    } catch (e) {
        console.error('Error loading categories:', e);
    }
}

async function loadBooks() {
    const search = document.getElementById('search').value;
    const category = document.getElementById('category').value;
    const sort = document.getElementById('sort').value;
    const priceFilter = document.getElementById('priceFilter').value;
    
    const params = new URLSearchParams();
    if (search) params.append('search', search);
    if (category) params.append('category', category);
    params.append('sort', sort);
    if (priceFilter) params.append('priceFilter', priceFilter);

    try {
        booksData = await fetch(`/api/books?${params}`).then(r => r.json());
        renderBooks();
    } catch (e) {
        console.error('Error loading books:', e);
    }
}

// Initialize view
document.getElementById('books').className = currentView === 'grid' ? 'books-grid' : 'books-list';
document.getElementById('gridViewBtn').classList.toggle('active', currentView === 'grid');
document.getElementById('listViewBtn').classList.toggle('active', currentView === 'list');

let timeout;
document.getElementById('search').addEventListener('input', () => {
    clearTimeout(timeout);
    timeout = setTimeout(loadBooks, 300);
});
document.getElementById('category').addEventListener('change', loadBooks);
document.getElementById('sort').addEventListener('change', loadBooks);
document.getElementById('priceFilter').addEventListener('change', loadBooks);

loadCategories().then(loadBooks);
</script>
{% endblock %}
