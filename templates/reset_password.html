{% load static %}
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include '_seo_head.html' %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
        }
        
        .auth-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            max-width: 480px;
            margin: 0 auto;
        }
        
        .auth-image {
            flex: 1;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            position: relative;
            display: none;
        }
        
        .auth-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200') center/cover;
            opacity: 0.2;
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            margin-bottom: 2rem;
        }
        
        .auth-logo svg {
            color: var(--accent-primary);
        }
        
        .auth-form h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        
        .auth-form > p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        
        .auth-form .btn {
            width: 100%;
            padding: 1rem;
            margin-top: 0.5rem;
        }
        
        .message {
            padding: 0.875rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }
        
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
        }
        
        .invalid-token {
            text-align: center;
            padding: 2rem;
        }
        
        .invalid-token svg {
            width: 64px;
            height: 64px;
            color: var(--danger);
            margin-bottom: 1rem;
        }
        
        @media (min-width: 768px) {
            .auth-image { display: block; }
            .auth-form { padding: 3rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-form">
            <a href="/" class="auth-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                Biblioteca Virtual
            </a>
            
            <div id="validToken">
                <h1>Crear nueva contraseña</h1>
                <p>Ingresa tu nueva contraseña para <strong id="userEmail"></strong></p>
                
                <div class="message" id="message"></div>
                
                <form id="resetForm">
                    <div class="form-group">
                        <label>Nueva contraseña</label>
                        <input type="password" id="password" required placeholder="Mínimo 6 caracteres" minlength="6" data-testid="reset-password">
                    </div>
                    <div class="form-group">
                        <label>Confirmar contraseña</label>
                        <input type="password" id="confirmPassword" required placeholder="Repite la contraseña" data-testid="reset-confirm">
                    </div>
                    <button type="submit" class="btn btn-primary" id="submitBtn" data-testid="reset-submit">
                        Cambiar contraseña
                    </button>
                </form>
            </div>
            
            <div id="invalidToken" class="invalid-token" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <h2>Enlace inválido o expirado</h2>
                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">
                    El enlace de recuperación no es válido o ya expiró.
                </p>
                <a href="/forgot-password" class="btn btn-primary">Solicitar nuevo enlace</a>
            </div>
        </div>
        <div class="auth-image"></div>
    </div>
    
    <script>
        const saved = localStorage.getItem('theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
        
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        
        async function verifyToken() {
            if (!token) {
                showInvalid();
                return;
            }
            
            try {
                const res = await fetch(`/api/auth/verify-token?token=${token}`);
                const data = await res.json();
                
                if (data.valid) {
                    document.getElementById('userEmail').textContent = data.email;
                } else {
                    showInvalid();
                }
            } catch (e) {
                showInvalid();
            }
        }
        
        function showInvalid() {
            document.getElementById('validToken').style.display = 'none';
            document.getElementById('invalidToken').style.display = 'block';
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgEl = document.getElementById('message');
            const btn = document.getElementById('submitBtn');

            if (password !== confirmPassword) {
                msgEl.className = 'message error';
                msgEl.textContent = 'Las contraseñas no coinciden';
                msgEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Guardando...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msgEl.className = 'message success';
                    msgEl.textContent = '¡Contraseña actualizada! Redirigiendo...';
                    msgEl.style.display = 'block';
                    document.getElementById('resetForm').style.display = 'none';
                    setTimeout(() => location.href = '/login', 2000);
                } else {
                    msgEl.className = 'message error';
                    msgEl.textContent = data.error || 'Error al cambiar contraseña';
                    msgEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Cambiar contraseña';
                }
            } catch (e) {
                msgEl.className = 'message error';
                msgEl.textContent = 'Error de conexión';
                msgEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Cambiar contraseña';
            }
        });
        
        verifyToken();
    </script>
</body>
</html>
