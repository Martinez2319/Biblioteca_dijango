{% load static %}
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include '_seo_head.html' %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
        }
        
        .auth-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            max-width: 480px;
            margin: 0 auto;
        }
        
        .auth-image {
            flex: 1;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            position: relative;
            display: none;
        }
        
        .auth-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200') center/cover;
            opacity: 0.2;
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            margin-bottom: 2rem;
        }
        
        .auth-logo svg {
            color: var(--accent-primary);
        }
        
        .auth-form h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        
        .auth-form > p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        
        .auth-form .btn {
            width: 100%;
            padding: 1rem;
            margin-top: 0.5rem;
        }
        
        .demo-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .demo-box strong {
            color: var(--text-primary);
        }
        
        .auth-link {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9375rem;
            color: var(--text-muted);
        }
        
        .auth-link a {
            color: var(--accent-primary);
            font-weight: 600;
        }
        
        .error-msg {
            padding: 0.875rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-md);
            color: var(--danger);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        @media (min-width: 768px) {
            .auth-image { display: block; }
            .auth-form { padding: 3rem; }
        }

        /* ===== Boton Google (OAuth) ===== */
        .btn-google {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.05s;
        }
        .btn-google:hover { background: var(--bg-secondary); border-color: var(--accent-primary); }
        .btn-google:active { transform: scale(0.995); }
        .btn-google svg { flex-shrink: 0; }
        .or-sep {
            display: flex; align-items: center; gap: 0.75rem;
            margin: 1.25rem 0 1rem; color: var(--text-muted);
            font-size: 0.8125rem;
        }
        .or-sep::before, .or-sep::after {
            content: ''; flex: 1; height: 1px; background: var(--border-color);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-form">
            <a href="/" class="auth-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                Biblioteca Virtual
            </a>
            
            <h1>Bienvenido de vuelta</h1>
            <p>Ingresa tus credenciales para continuar</p>

            <button type="button" class="btn-google" id="googleBtn" data-testid="login-google">
                <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
                    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
                    <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.4 35 26.8 36 24 36c-5.3 0-9.7-3.4-11.3-8L6.1 33C9.3 39.5 16.1 44 24 44z"/>
                    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.2 5.2C41.4 35.8 44 30.3 44 24c0-1.2-.1-2.4-.4-3.5z"/>
                </svg>
                <span>Continuar con Google</span>
            </button>
            <div class="or-sep"><span>o con tu correo</span></div>

            <div class="error-msg" id="errorMsg"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" required placeholder="tu@email.com" data-testid="login-email">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••" data-testid="login-password">
                </div>
                <button type="submit" class="btn btn-primary" data-testid="login-submit">Iniciar Sesión</button>
            </form>
            
            <div class="demo-box">
                <strong>Demo Admin:</strong> admin@biblioteca.com / admin123
            </div>
            <p class="auth-link" style="margin-top: 1rem;">
                <a href="/forgot-password">¿Olvidaste tu contraseña?</a>
            </p>
            
            <p class="auth-link">
                ¿No tienes cuenta? <a href="/register">Regístrate aquí</a>
            </p>
        </div>
        <div class="auth-image"></div>
    </div>
    
    <script>
        // Theme
        const saved = localStorage.getItem('theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);

        // ================== Google OAuth ==================
        // REMINDER: DO NOT HARDCODE THE URL, OR ADD ANY FALLBACKS OR REDIRECT URLS,
        // THIS BREAKS THE AUTH. Redirigimos a Emergent usando window.location.origin.
        document.getElementById('googleBtn').addEventListener('click', () => {
            const redirectUrl = window.location.origin + '/auth/google/callback';
            window.location.href =
                'https://auth.emergentagent.com/?redirect=' + encodeURIComponent(redirectUrl);
        });
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    location.href = data.user.role === 'admin' ? '/dashboard' : '/';
                } else {
                    errorEl.textContent = data.error || 'Credenciales invalidas';
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                errorEl.textContent = 'Error al iniciar sesion';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
